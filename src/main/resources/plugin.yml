main: net.elytrapvp.elytracore.ElytraCore

name: ElytraCore
api-version: 1.15
version: 1.0
author: ElytraPvP

commands:
  discord:
    usage: /<command>
    description: View the server's discord.
    aliases: [dc]
  ecsee:
    usage: /<command> [player]
    description: View a player's ender chest.
  invsee:
    usage: /<command> [player]
    description: View a player's inventory.
  list:
    usage: /<command>
    description: View online players.
    aliases: [online, players]